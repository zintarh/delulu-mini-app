specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DeluluMarket
    network: celo
    source:
      abi: DeluluMarket
      address: "0x7692199630F3865160fB1Fa496961251fA15aFEa"
      startBlock: 60517387
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - Delulu
        - Stake
        - Claim
        - Milestone
        - Challenge
        - CreatorStats
        - ShareTrade
        - ShareHolding
        - CommunityCampaignParticipant
        - CommunityProof
        - CommunityCampaignMilestone
        - CommunityCampaignMilestoneCompletion
      abis:
        - name: DeluluMarket
          file: ./abis/DeluluMarket.json
      eventHandlers:
        - event: DeluluCreated(indexed uint256,indexed address,indexed address,string,uint256,uint256,uint256,uint256,uint256)
          handler: handleDeluluCreated
        - event: DeluluJoinedChallenge(indexed uint256,indexed uint256)
          handler: handleDeluluJoinedChallenge
        - event: PointsAllocated(indexed uint256,uint256,uint256)
          handler: handlePointsAllocated
        - event: SupportClaimed(indexed uint256,indexed address,uint256,uint256)
          handler: handleSupportClaimed
        - event: ChallengeRewardClaimed(indexed uint256,indexed uint256,indexed address,uint256,uint256)
          handler: handleChallengeRewardClaimed
        - event: ProfileUpdated(indexed address,string)
          handler: handleProfileUpdated
        - event: MilestonesAdded(indexed uint256,uint256)
          handler: handleMilestonesAdded
        - event: MilestoneCreatedDetailed(indexed uint256,indexed uint256,bytes32,string,uint256,uint256)
          handler: handleMilestoneCreatedDetailed
        - event: MilestoneSubmitted(indexed uint256,indexed uint256,string)
          handler: handleMilestoneSubmitted
        - event: MilestoneVerified(indexed uint256,indexed uint256,uint256)
          handler: handleMilestoneVerified
        - event: MilestoneDeleted(indexed uint256,indexed uint256)
          handler: handleMilestoneDeleted
        - event: TipExecuted((uint256,uint256,address,uint256,bool,bool,bool))
          handler: handleTipExecuted
        - event: TipPointsAwarded(indexed uint256,indexed address,indexed address,uint256,uint256)
          handler: handleTipPointsAwarded
        - event: EarlyCompletionBonus(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleEarlyCompletionBonus
        - event: StreakBonus(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleStreakBonus
        - event: ChallengeCreated(indexed uint256,string,uint256,uint256,uint256)
          handler: handleChallengeCreated
        - event: CommunityChallengeCreated(indexed uint256,string,uint256,uint256,indexed address)
          handler: handleCommunityChallengeCreated
        - event: CommunityCampaignJoined(indexed uint256,indexed address)
          handler: handleCommunityCampaignJoined
        - event: CommunityProofSubmitted(indexed uint256,indexed address,string,uint256,uint256)
          handler: handleCommunityProofSubmitted
        - event: CommunityChallengeFunded(indexed uint256,uint256,uint256,indexed address)
          handler: handleCommunityChallengeFunded
        - event: CommunityChallengeEnded(indexed uint256,uint256)
          handler: handleCommunityChallengeEnded
        - event: GoalFailed(indexed uint256,uint256)
          handler: handleGoalFailed
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
        - event: SharesBought(indexed uint256,indexed address,uint256,uint256,uint256,uint256)
          handler: handleSharesBought
        - event: SharesSold(indexed uint256,indexed address,uint256,uint256,uint256,uint256)
          handler: handleSharesSold
      file: ./src/delulu-market.ts
  - kind: ethereum
    name: CommunityMarketV1
    network: celo
    source:
      abi: CommunityMarketV1
      address: "0xE652E0cA7DACb6489928C6801D83356a016DcfE1"
      startBlock: 70315658
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Challenge
        - CommunityCampaignParticipant
        - CommunityCampaignMilestone
        - CommunityCampaignMilestoneCompletion
        - User
      abis:
        - name: CommunityMarketV1
          file: ./abis/CommunityMarketV1.json
      eventHandlers:
        - event: CommunityChallengeCreated(indexed uint256,string,uint256,uint256,indexed address)
          handler: handleCMv1ChallengeCreated
        - event: CommunityCampaignPaidConfigured(indexed uint256,bool,address,uint256,uint8)
          handler: handleCMv1PaidConfigured
        - event: CommunityCampaignMilestonesAdded(indexed uint256,uint256)
          handler: handleCMv1MilestonesAdded
        - event: CommunityCampaignJoined(indexed uint256,indexed address)
          handler: handleCMv1CampaignJoined
        - event: CommunityCampaignMilestoneProofSubmitted(indexed uint256,indexed uint256,indexed address,string,uint256,uint256)
          handler: handleCMv1MilestoneProofSubmitted
        - event: CommunityChallengeFunded(indexed uint256,uint256,uint256,indexed address)
          handler: handleCMv1ChallengeFunded
        - event: CommunityChallengeEnded(indexed uint256,uint256)
          handler: handleCMv1ChallengeEnded
        - event: CommunityJoinStakeClaimed(indexed uint256,indexed address,address,uint256)
          handler: handleCMv1JoinStakeClaimed
      file: ./src/community-market-v1.ts

  - kind: ethereum
    name: ERC1967Proxy
    network: celo
    source:
      abi: ERC1967Proxy
      address: "0x7692199630F3865160fB1Fa496961251fA15aFEa"
      startBlock: 60517387
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Upgraded
      abis:
        - name: ERC1967Proxy
          file: ./abis/ERC1967Proxy.json
      eventHandlers:
        - event: Upgraded(indexed address)
          handler: handleUpgraded
      file: ./src/erc-1967-proxy.ts
