specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DeluluMarket
    network: celo
    source:
      abi: DeluluMarket
      address: "0xdbed1e69824dB9B5c5F4bbeBE45330b6311c3B98"
      startBlock: 60183999
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - Delulu
        - Stake
        - Claim
      abis:
        - name: DeluluMarket
          file: ./abis/DeluluMarket.json
      eventHandlers:
        - event: DeluluCancelled(indexed uint256,indexed address)
          handler: handleDeluluCancelled
        - event: DeluluCreated(indexed uint256,indexed address,indexed
            address,string,uint256,uint256,uint256)
          handler: handleDeluluCreated
        - event: DeluluResolved(indexed
            uint256,bool,uint256,uint256,uint256,uint256,uint256)
          handler: handleDeluluResolved
        - event: EmergencyRefund(indexed uint256,indexed address,uint256)
          handler: handleEmergencyRefund
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: StakePlaced(indexed uint256,indexed address,uint256,bool,uint256)
          handler: handleStakePlaced
        - event: Unpaused(address)
          handler: handleUnpaused
        - event: WinningsClaimed(indexed uint256,indexed address,uint256)
          handler: handleWinningsClaimed
        - event: ProfileUpdated(indexed address,string,string)
          handler: handleProfileUpdated
        - event: SenateUpdated(indexed address,indexed address)
          handler: handleSenateUpdated
      file: ./src/delulu-market.ts
  - kind: ethereum
    name: ERC1967Proxy
    network: celo
    source:
      abi: ERC1967Proxy
      address: "0xdbed1e69824dB9B5c5F4bbeBE45330b6311c3B98"
      startBlock: 60183999
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Upgraded
      abis:
        - name: ERC1967Proxy
          file: ./abis/ERC1967Proxy.json
      eventHandlers:
        - event: Upgraded(indexed address)
          handler: handleUpgraded
      file: ./src/erc-1967-proxy.ts
