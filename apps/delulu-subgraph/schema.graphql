# User entity - tracks user profiles and activity
type User @entity(immutable: false) {
  id: Bytes! # Wallet address
  totalStaked: BigInt! # Total amount user has staked across all delulus
  username: String # Username set via ProfileUpdated event
  metadataHash: String # IPFS CID for encrypted metadata (deprecated in v2, kept for compatibility)
  deluluPoints: BigInt! # Points earned from milestones and challenges
  
  # Reverse lookups
  delulus: [Delulu!]! @derivedFrom(field: "creator")
  stakes: [Stake!]! @derivedFrom(field: "user")
  claims: [Claim!]! @derivedFrom(field: "user")
  milestones: [Milestone!]! @derivedFrom(field: "creator")
}

# Delulu entity - tracks each delulu/market
type Delulu @entity(immutable: false) {
  id: ID! # The onChainId.toString()
  onChainId: BigInt! # Raw on-chain ID
  creator: User! # Relation to User entity
  creatorAddress: String! # Lowercase address string
  contentHash: String! # IPFS hash
  token: Bytes # ERC20 token address for this market (fetched from on-chain)
  
  # Timestamps and Deadlines
  stakingDeadline: BigInt # When staking closes (fetched from on-chain)
  resolutionDeadline: BigInt # When resolution should happen (fetched from on-chain)
  createdAt: BigInt! # Block timestamp when created
  
  # Financials - new contract structure
  totalSupportCollected: BigInt! # Total support collected
  totalSupporters: BigInt! # Number of supporters
  creatorStake: BigInt! # Initial support from creator
  
  # Challenge and Milestone tracking
  challengeId: BigInt # Challenge ID if joined (nullable)
  points: BigInt # Points allocated to this delulu (nullable until allocated)
  milestoneCount: BigInt! # Number of milestones
  
  # Status trackers
  isResolved: Boolean! # Whether delulu is resolved
  isCancelled: Boolean! # Whether delulu is cancelled
  rewardClaimed: Boolean! # Whether rewards have been claimed
  
  # Reverse lookups
  stakes: [Stake!]! @derivedFrom(field: "delulu")
  claims: [Claim!]! @derivedFrom(field: "delulu")
  milestones: [Milestone!]! @derivedFrom(field: "delulu")
}

# Stake entity - tracks each support stake
type Stake @entity(immutable: true) {
  id: ID! # txHash-logIndex
  delulu: Delulu! # Relation to Delulu
  user: User! # Relation to User
  amount: BigInt! # Amount staked
  txHash: Bytes! # Transaction hash
  createdAt: BigInt! # Block timestamp
}

# Claim entity - tracks reward claims
type Claim @entity(immutable: true) {
  id: ID! # txHash-logIndex
  delulu: Delulu! # Relation to Delulu
  user: User! # Relation to User
  amount: BigInt! # Amount claimed
  claimType: String! # "support" or "challenge"
  txHash: Bytes! # Transaction hash
  createdAt: BigInt! # Block timestamp
}

# Milestone entity - tracks milestones for delulus
type Milestone @entity(immutable: false) {
  id: ID! # deluluId-milestoneId
  delulu: Delulu! # Relation to Delulu
  milestoneId: BigInt! # On-chain milestone ID
  creator: User! # Creator of the delulu (for convenience)
  descriptionHash: Bytes! # Hash of milestone description
  deadline: BigInt! # Milestone deadline
  proofLink: String # Proof link submitted (nullable until submitted)
  isSubmitted: Boolean! # Whether milestone has been submitted
  isVerified: Boolean! # Whether milestone has been verified
  pointsEarned: BigInt! # Points earned when verified
  submittedAt: BigInt # Block timestamp when submitted (nullable)
  verifiedAt: BigInt # Block timestamp when verified (nullable)
  rejectedAt: BigInt # Block timestamp when rejected (nullable)
  rejectionReason: String # Reason for rejection if rejected
}

# Challenge entity - tracks admin-created challenges
type Challenge @entity(immutable: false) {
  id: ID! # Challenge ID
  challengeId: BigInt! # On-chain challenge ID
  contentHash: String! # Challenge content hash
  poolAmount: BigInt! # Total pool amount
  startTime: BigInt! # When challenge starts
  duration: BigInt! # Challenge duration
  totalPoints: BigInt! # Total points allocated across all delulus
  active: Boolean! # Whether challenge is active
  createdAt: BigInt! # Block timestamp when created
}

# Upgraded entity - tracks contract upgrades
type Upgraded @entity(immutable: true) {
  id: ID! # txHash-logIndex
  implementation: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
