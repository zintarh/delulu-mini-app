# ============================================================
# DELULU QUERIES
# Used by: Home feed, Search, Right sidebar, Profile page
# ============================================================

# Home feed — paginated list of all delulus
query GetDelulus(
  $first: Int = 20
  $skip: Int = 0
  $orderBy: Delulu_orderBy = createdAt
  $orderDirection: OrderDirection = desc
  $where: Delulu_filter
) {
  delulus(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: $where
  ) {
    id
    onChainId
    token
    creator {
      id
    }
    creatorAddress
    contentHash
    stakingDeadline
    resolutionDeadline
    createdAt
    creatorStake
    creatorIsStaked
    creatorStakeCurrent
    totalSupportCollected
    totalSupporters
    challengeId
    points
    milestoneCount
    isResolved
    isCancelled
    rewardClaimed
  }
}

# Single delulu detail page — includes nested stakes, claims, and milestones
query GetDeluluById($id: ID!) {
  delulu(id: $id) {
    id
    onChainId
    token
    creator {
      id
      totalStaked
      username
    }
    creatorAddress
    contentHash
    stakingDeadline
    resolutionDeadline
    createdAt
    creatorStake
    creatorIsStaked
    creatorStakeCurrent
    totalSupportCollected
    totalSupporters
    challengeId
    points
    milestoneCount
    isResolved
    isCancelled
    rewardClaimed
    isFailed
    finisherWindowEnd
    stakes(first: 100, orderBy: createdAt, orderDirection: desc) {
      id
      user {
        id
      }
      amount
      txHash
      createdAt
    }
    claims(first: 100, orderBy: createdAt, orderDirection: desc) {
      id
      user {
        id
      }
      amount
      txHash
      createdAt
    }
    milestones(first: 50, orderBy: milestoneId, orderDirection: asc) {
      id
      milestoneId
      descriptionHash
      milestoneURI
      deadline
      startTime
      tippingWindowStart
      tippingWindowEnd
      isMissed
      proofLink
      isSubmitted
      isVerified
      pointsEarned
      totalSupport
      submittedAt
      verifiedAt
      rejectedAt
      rejectionReason
    }
  }
}

# Trending: top delulus sorted by total support collected
# Client-side: can further refine if needed
query GetTrendingDelulus($first: Int = 10) {
  delulus(
    first: $first
    orderBy: totalSupportCollected
    orderDirection: desc
    where: { isResolved: false, isCancelled: false }
  ) {
    id
    onChainId
    token
    creatorAddress
    contentHash
    totalSupportCollected
    stakingDeadline
    createdAt
    isResolved
    isCancelled
  }
}

# Active (not resolved, not cancelled) delulus for "ongoing" filtering
query GetActiveDelulus(
  $first: Int = 20
  $skip: Int = 0
  $orderBy: Delulu_orderBy = createdAt
  $orderDirection: OrderDirection = desc
) {
  delulus(
    first: $first
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    where: { isResolved: false, isCancelled: false }
  ) {
    id
    onChainId
    token
    creator {
      id
    }
    creatorAddress
    contentHash
    stakingDeadline
    resolutionDeadline
    createdAt
    creatorStake
    creatorIsStaked
    creatorStakeCurrent
    isResolved
    isCancelled
  }
}

# Subgraph metadata — useful for checking sync status
query GetSubgraphMeta {
  _meta {
    block {
      number
      timestamp
    }
    deployment
    hasIndexingErrors
  }
}
